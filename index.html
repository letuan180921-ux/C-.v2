<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">

    <title>WebAR Mô Hình Cá Heo - AR.js</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <!-- Component tự động xoay -->
    <script>
        AFRAME.registerComponent('auto-rotate', {
            tick: function (time, timeDelta) {
                // Quay quanh trục Y
                this.el.object3D.rotation.y += timeDelta * 0.001;
            }
        });
    </script>
</head>

<body style="margin:0; overflow:hidden;">

    <a-scene
        embedded
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: false;">

        <!-- Load model -->
        <a-assets>
            <a-asset-item
                id="bird-obj"
                src="./assets/10014_dolphin_v2_max2011_it2.obj">
            </a-asset-item>

            <a-asset-item
                id="bird-mtl"
                src="./assets/10014_dolphin_v2_max2011_it2.mtl">
            </a-asset-item>
        </a-assets>

        <!-- Marker Hiro -->
        <a-marker preset="hiro">

            <!-- Mô hình cá heo -->
            <a-obj-model
                src="#bird-obj"
                mtl="#bird-mtl"
                position="0 0 0"
                rotation="-90 0 0"
                scale="0.01 0.01 0.01"
                auto-rotate>
            </a-obj-model>

        </a-marker>

        <!-- Camera -->
        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
